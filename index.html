<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Retro Platformer 2026</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            max-width: 100vw;
            max-height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #4baaff;
        }
        #touchControls {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            pointer-events: none;
        }
        .control-group {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        .touch-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            user-select: none;
            -webkit-user-select: none;
            cursor: pointer;
        }
        .touch-btn:active {
            opacity: 0.7;
        }
        #leftBtn {
            background: #ccc;
        }
        #rightBtn {
            background: #ccc;
        }
        #jumpBtn {
            background: #ff6464;
        }
        .arrow {
            font-size: 24px;
        }
        @media (max-width: 600px) {
            .touch-btn {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="touchControls">
            <div class="control-group">
                <button id="leftBtn" class="touch-btn"><span class="arrow">◀</span></button>
                <button id="rightBtn" class="touch-btn"><span class="arrow">▶</span></button>
            </div>
            <div class="control-group">
                <button id="jumpBtn" class="touch-btn">JUMP</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed', err));
        }
    </script>
</body>
</html>
